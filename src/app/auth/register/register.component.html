<div class="bg-page flex h-full items-center justify-center">
<section class="flex flex-col w-full sm:w-auto sm:h-auto sm:rounded-md bg-white/10 backdrop-blur-md border border-white/20 shadow-2xl">
<form class="flex-1 flex flex-col gap-4 text-slate-200 p-6 m-5 sm:p-4 sm:min-w-96"  [formGroup]="registerForm">
    <h2 class="text-xl font-bold mb-2">Register</h2>
  
    <app-input
      id="email"
      label="Email"
      [required]=true
      [control]="registerForm.controls.email"
    />
    <app-input
      id="username"
      label="Username"
      [required]=true
      [control]="registerForm.controls.username"
    />
    <div class="h-1">
    @if(registerForm.get('username')?.errors?.['usernameTaken'] && registerForm.get('username')?.touched) {
      <span>Username is already taken</span>
    }
    </div>
     <app-input
      id="password"
      label="Password"
      type="password"
      [required]=true
      [control]="registerForm.controls.password"
    />
    <button type="submit" (click)="onSubmit()">{{ registerForm.pending ? 'loading...' :'Register' }}</button>

  </form>
  </section>
</div>
