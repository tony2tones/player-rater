<div class="relative">
  <!-- Bell button -->
  <button
    (click)="toggle()"
    class="relative p-1.5 text-amber-50 hover:text-slate-300 transition"
    aria-label="Match invites"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
    </svg>
    @if (inviteService.pendingInvites().length > 0) {
      <span class="absolute top-0 right-0 flex h-4 w-4 items-center justify-center rounded-full bg-red-500 text-[10px] text-white font-bold leading-none">
        {{ inviteService.pendingInvites().length }}
      </span>
    }
  </button>

  @if (isOpen()) {
    <!-- Transparent backdrop closes dropdown on outside click -->
    <div class="fixed inset-0 z-10" (click)="close()"></div>

    <!-- Dropdown panel -->
    <div class="absolute right-0 z-20 mt-2 w-80 rounded-xl bg-white shadow-xl ring-1 ring-black/5 overflow-hidden">
      <div class="px-4 py-3 border-b border-slate-100">
        <h3 class="text-sm font-semibold text-slate-700">Match Invites</h3>
      </div>

      @if (inviteService.pendingInvites().length === 0) {
        <p class="px-4 py-8 text-sm text-slate-400 text-center">No pending invites</p>
      } @else {
        <ul class="divide-y divide-slate-100 max-h-96 overflow-y-auto">
          @for (invite of inviteService.pendingInvites(); track invite.id) {
            <li class="px-4 py-3 space-y-2">
              <div>
                <p class="text-sm font-medium text-slate-800">{{ invite.matchLocation }}</p>
                <p class="text-xs text-slate-500">{{ formatDate(invite.matchDate) }}</p>
              </div>
              <div class="flex gap-2">
                <button
                  (click)="accept(invite)"
                  class="flex-1 rounded-lg bg-slate-800 text-white text-xs font-semibold py-1.5 hover:bg-slate-900 transition"
                >
                  Accept
                </button>
                <button
                  (click)="decline(invite)"
                  class="flex-1 rounded-lg border border-slate-300 text-slate-600 text-xs font-semibold py-1.5 hover:bg-slate-50 transition"
                >
                  Decline
                </button>
              </div>
            </li>
          }
        </ul>
      }
    </div>
  }
</div>
