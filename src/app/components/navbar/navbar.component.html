
<div class="flex justify-between p-4 bg-slate-800 text-amber-50 hover:cursor-pointer">
  <div class="flex gap-3">
    @if(this.router.url === '/auth/login' || this.router.url === '/auth/register') {
      <a class="hover:text-slate-500" routerLink="/auth/login">Login</a>
      <a class="hover:text-slate-500" routerLink="/auth/register">Register</a>
    }
  </div>
  <span class="hover:text-slate-500" (click)="logout()">Logout</span>
</div>
