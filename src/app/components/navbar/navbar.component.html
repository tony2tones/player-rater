<div class="flex justify-between items-center p-4 bg-slate-800 text-amber-50">
  <div class="flex gap-3">
    @if (isAuthPage) {
      <a class="hover:text-slate-400 transition" routerLink="/auth/login">Login</a>
      <a class="hover:text-slate-400 transition" routerLink="/auth/register">Register</a>
    }
  </div>
  <div class="flex items-center gap-3">
    @if (!isAuthPage) {
      <app-notifications />
    }
    <span class="hover:text-slate-400 transition cursor-pointer" (click)="logout()">Logout</span>
  </div>
</div>
